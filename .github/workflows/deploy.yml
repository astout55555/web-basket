name: Deploy

# Runs only after the CI workflow finishes successfully on main —
# a deploy can never outrun the tests.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Never let two deploys interleave.
concurrency: production-deploy

jobs:
  build-and-push:
    # DEPLOY_ENABLED is a repository variable (Settings → Secrets and
    # variables → Actions → Variables). Leave unset until the Azure VM and
    # secrets exist; flip to 'true' to activate the pipeline.
    if: github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/web-basket-app:latest
            ghcr.io/${{ github.repository_owner }}/web-basket-app:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts
      - name: Sync infra files to the VM
        run: >-
          scp -i ~/.ssh/deploy_key docker-compose.yml Caddyfile
          "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/web-basket/"
      - name: Pull new image and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" <<'EOF'
            set -euo pipefail
            cd ~/web-basket
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull app
            docker compose up -d
            docker image prune -f
          EOF
